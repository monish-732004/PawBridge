# Rename `app` below to whatever you create with `fly apps create <name>`
# (or let `fly launch` regenerate this file interactively — either is fine,
# just make sure the [[mounts]] and [env] blocks below survive).
app = "pawbridge-api"
primary_region = "sin"

[build]

[env]
  PORT = "3001"
  DB_PATH = "/data/pawbridge.db"
  NODE_ENV = "production"

[[mounts]]
  source = "pawbridge_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
